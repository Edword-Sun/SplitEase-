# 前后端分镜像，在服务器上一起启动（数据库请自备或再加 mysql 服务）
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: split_ease_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-split_ease}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: split_ease_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
